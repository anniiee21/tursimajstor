<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TursiMajstor - Моите обяви</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="navbar">
      <h1 class="brand">TursiMajstor</h1>
      <button id="mobileMenuBtn" class="mobile-menu-btn">☰ Меню</button>
      <div id="navLinks" class="nav-links">
  <a href="/">Начало</a>
  <a href="/jobs-page">Обяви</a>
  <a href="/my-jobs-page">Моите обяви</a>
  <a href="/inbox-page">Поща</a>
  <a href="/notifications-page">Известия</a>
    <a href="/favorites-page">Любими</a>
  <a id="applicationsNavLink" href="/applications-page">Кандидатури</a>
  <a href="/feed-page">Новини</a>
</div>
      <div class="user-menu">
        <button id="userMenuBtn" class="user-chip">Вход</button>
        <div id="userDropdown" class="user-dropdown hidden"></div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="card">
    <div class="section-head">
      <div>
        <h2>Моите обяви</h2>
        <div class="small-text">Управлявай публикуваните от теб обяви.</div>
      </div>
      <div id="myJobsCount" class="results-info"></div>
    </div>
    <div id="myJobsList" class="job-cards-grid"></div>
  </div>
</div>

<script src="/app.js"></script>
<script>
updateHeaderUser();
updateRoleVisibility();

const myJobsList = document.getElementById("myJobsList");
const myJobsCount = document.getElementById("myJobsCount");

function getJobTypeText(type) {
  return type === "service" ? "Предлагам услуга" : "Търся човек";
}

async function loadMyJobs() {
  const currentUser = getCurrentUser();

  if (!currentUser) {
    myJobsList.innerHTML = '<div class="empty">Трябва да си влязъл, за да виждаш своите обяви.</div>';
    return;
  }

  const res = await fetch(`/my-jobs/${encodeURIComponent(currentUser.email)}`);
  const data = await res.json();

  myJobsCount.textContent = `${data.length} обяви`;

  if (!data.length) {
    myJobsList.innerHTML = '<div class="empty">Все още нямаш публикувани обяви.</div>';
    return;
  }

  myJobsList.innerHTML = data.map(job => `
    <div class="job-market-card">
      <div class="job-market-top">
        <div>
          <h4 class="job-market-title">${job.title}</h4>
          <div class="job-market-meta">
            <span>📍 ${job.city || "Без град"}</span>
            <span>🏷 ${job.category || "Без категория"}${job.subcategory ? " / " + job.subcategory : ""}</span>
            <span>📌 ${getJobTypeText(job.type)}</span>
            ${job.budget ? `<span>💰 ${job.budget} лв</span>` : ""}
          </div>
        </div>
      </div>

      ${job.imageUrl ? `<img src="${job.imageUrl}" alt="Снимка към обявата" class="job-image">` : ""}
      <p class="job-market-desc">${job.description || ""}</p>

      <div class="job-card-actions">
        <a href="/job/${job.id}" class="job-card-btn">Виж обявата</a>
        <button type="button" class="job-card-btn secondary" onclick="openApplications(${job.id})">Кандидатури</button>
      </div>
    </div>
  `).join("");
}

function openApplications(jobId) {
  localStorage.setItem("selectedJobId", String(jobId));
  window.location.href = "/applications-page";
}

loadMyJobs();
</script>
</body>
</html>
