<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TursiMajstor - Профил</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="navbar">
      <h1 class="brand">TursiMajstor</h1>
      <button id="mobileMenuBtn" class="mobile-menu-btn">☰ Меню</button>
      <div id="navLinks" class="nav-links">
  <a href="/">Начало</a>
  <a href="/jobs-page">Обяви</a>
  <a href="/my-jobs-page">Моите обяви</a>
  <a href="/inbox-page">Поща</a> 
  <a href="/notifications-page">Известия</a>
    <a href="/favorites-page">Любими</a>
  <a id="applicationsNavLink" href="/applications-page">Кандидатури</a>
  <a href="/feed-page">Новини</a>
</div> 
      <div class="user-menu">
        <button id="userMenuBtn" class="user-chip">Вход</button>
        <div id="userDropdown" class="user-dropdown hidden"></div>
      </div>
    </div> 
  </div> 
</header>

<div class="container">
  <div class="card">
    <h2>Профил</h2>
    <div id="profileContent">Зареждане...</div>
  </div>
</div>

<script src="/app.js"></script>
<script>
updateHeaderUser();
updateRoleVisibility();

async function loadProfile() {
  const email = decodeURIComponent(window.location.pathname.split("/profile/")[1] || "");
  const res = await fetch(`/api/profile/${encodeURIComponent(email)}`);
  const data = await res.json();

  document.getElementById("profileContent").innerHTML = `
    <h3>${data.user?.name || "Потребител"}</h3>
    <p>${data.user?.description || ""}</p>
    <div class="meta">${data.user?.email || ""}</div>
  `;
}

loadProfile();
</script>
</body>
</html>
