<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TursiMajstor - Чат</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="navbar">
        <h1 class="brand">TursiMajstor</h1>

       <div class="nav-links">
  <a href="/">Обяви</a>
  <a id="applicationsNavLink" href="/applications-page">Кандидатури</a>
  <a class="active" href="/chat-page">Чат</a>
</div>

       <div class="user-menu">
  <button id="userMenuBtn" class="user-chip">Вход</button>

  <div id="userDropdown" class="user-dropdown hidden">
    
    <div id="userInfo"></div>

    <div class="auth-tabs">
  <button id="loginTabBtn" class="auth-tab active">Вход</button>
  <button id="registerTabBtn" class="auth-tab">Регистрация</button>
</div>

<div id="loginFormBox" class="auth-box">
  <input id="loginEmail" placeholder="Имейл">
  <input id="loginPassword" type="password" placeholder="Парола">
  <button onclick="login()">Влез</button>
</div>

<div id="registerFormBox" class="auth-box hidden">
  <input id="regName" placeholder="Име">
  <input id="regEmail" placeholder="Имейл">
  <input id="regPassword" type="password" placeholder="Парола">
  <select id="regRole">
    <option value="client">Клиент</option>
    <option value="worker">Изпълнител</option>
  </select>
  <button onclick="register()">Регистрация</button>
</div>

    <button onclick="logout()" class="danger-btn">Изход</button>

  </div>
</div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Чат по обява</h2>
      <div id="chatStatus" class="status-box"></div>
      <div id="selectedJobBox" class="selected-job">Не е избрана обява за чат.</div>

      <div id="chatMessages" class="chat-box">
        <div class="empty">Все още няма съобщения.</div>
      </div>

      <form id="chatForm">
        <label for="chatText">Ново съобщение</label>
        <textarea id="chatText" required></textarea>
        <button type="submit" class="chat-btn">Изпрати съобщение</button>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    updateHeaderUser();

    const chatForm = document.getElementById("chatForm");
    const chatText = document.getElementById("chatText");
    const chatMessages = document.getElementById("chatMessages");
    const chatStatus = document.getElementById("chatStatus");
    const selectedJobBox = document.getElementById("selectedJobBox");

    async function loadMessages() {
      const jobId = localStorage.getItem("selectedChatJobId");
      const jobTitle = localStorage.getItem("selectedChatJobTitle");

      if (!jobId) {
        chatMessages.innerHTML = '<div class="empty">Няма избрана обява за чат.</div>';
        return;
      }

      selectedJobBox.textContent = `Чат за обява: ${jobTitle || "Без заглавие"}`;

      const res = await fetch(`/messages/${jobId}`);
      const data = await res.json();

      chatMessages.innerHTML = "";

      if (!res.ok || !data.length) {
        chatMessages.innerHTML = '<div class="empty">Все още няма съобщения за тази обява.</div>';
        return;
      }

      data.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message-item";
        div.innerHTML = `
          <strong>${msg.senderName} (${roleLabel(msg.senderRole)})</strong>
          <div class="meta">${msg.createdAt}</div>
          <div>${msg.text}</div>
        `;
        chatMessages.appendChild(div);
      });
    }

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearStatus(chatStatus);

      const currentUser = getCurrentUser();
      const jobId = localStorage.getItem("selectedChatJobId");

      if (!currentUser) {
        showStatus(chatStatus, "Трябва първо да влезеш.", "error");
        return;
      }

      if (!jobId) {
        showStatus(chatStatus, "Няма избрана обява.", "error");
        return;
      }

      const text = chatText.value.trim();
      if (!text) {
        showStatus(chatStatus, "Напиши съобщение.", "error");
        return;
      }

      const res = await fetch("/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          jobId: Number(jobId),
          senderName: currentUser.name,
          senderRole: currentUser.role,
          text
        })
      });

      const data = await res.json();

      if (!res.ok) {
        showStatus(chatStatus, data.message || "Грешка.", "error");
        return;
      }

      chatText.value = "";
      showStatus(chatStatus, "Съобщението е изпратено ✅", "success");
      loadMessages();
    });

    loadMessages();
  </script>
</body>
</html>
