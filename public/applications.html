<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TursiMajstor - Кандидатури</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="navbar">
      <h1 class="brand">TursiMajstor</h1>
      <button id="mobileMenuBtn" class="mobile-menu-btn">☰ Меню</button>
      <div id="navLinks" class="nav-links">
  <a href="/">Начало</a>
  <a href="/jobs-page">Обяви</a>
  <a href="/my-jobs-page">Моите обяви</a>
  <a href="/inbox-page">Поща</a>
  <a href="/notifications-page">Известия</a>
    <a href="/favorites-page">Любими</a>
  <a id="applicationsNavLink" href="/applications-page">Кандидатури</a>
  <a href="/feed-page">Новини</a>
</div>
      <div class="user-menu">
        <button id="userMenuBtn" class="user-chip">Вход</button>
        <div id="userDropdown" class="user-dropdown hidden"></div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>Кандидатури</h2>
    <div id="applicationsList" class="application-cards-list"></div>
  </div>
</div>

<script src="/app.js"></script>
<script>
updateHeaderUser();
updateRoleVisibility();

const applicationsList = document.getElementById("applicationsList");

async function loadApplications() {
  const currentUser = getCurrentUser();
  const jobId = localStorage.getItem("selectedJobId");

  if (!currentUser) {
    applicationsList.innerHTML = '<div class="empty">Трябва да си влязъл.</div>';
    return;
  }

  if (!jobId) {
    applicationsList.innerHTML = '<div class="empty">Няма избрана обява.</div>';
    return;
  }

  const res = await fetch(`/applications/${jobId}?email=${encodeURIComponent(currentUser.email)}`);
  const data = await res.json();

  if (!res.ok) {
    applicationsList.innerHTML = `<div class="empty">${data.message || "Грешка."}</div>`;
    return;
  }

  if (!data.length) {
    applicationsList.innerHTML = '<div class="empty">Няма кандидатури.</div>';
    return;
  }

  applicationsList.innerHTML = data.map(app => `
    <div class="application-status-card pending-card">
      <div class="application-card-top">
        <div>
          <h3 class="application-card-title">👤 ${app.name}</h3>
          <div class="application-card-meta">
            <span>📧 ${app.email || ""}</span>
            <span>📅 ${app.createdAt || ""}</span>
          </div>
        </div>
      </div>

      <div class="application-card-body">
        <p>${app.message || ""}</p>
      </div>

      <div class="application-card-actions-row">
        <div class="application-action-buttons">
          ${app.cvUrl ? `<a href="${app.cvUrl}" target="_blank" class="job-card-btn secondary">Виж CV</a>` : ""}
        </div>
      </div>
    </div>
  `).join("");
}

loadApplications();
</script>
</body>
</html>
