<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TursiMajstor - Кандидатури</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="navbar">
      <h1 class="brand">TursiMajstor</h1>

      <button id="mobileMenuBtn" class="mobile-menu-btn">☰ Меню</button>

      <div id="navLinks" class="nav-links">
        <a href="/">Начало</a>
        <a href="/jobs-page">Обяви</a>
        <a href="/my-jobs-page">Моите обяви</a>
        <a href="/favorites-page">Любими</a>
        <a href="/inbox-page">Поща</a>
        <a href="/notifications-page">Известия</a>
        <a class="active" id="applicationsNavLink" href="/applications-page">Кандидатури</a>
        <a href="/feed-page">Новини</a>
      </div>

      <div class="user-menu">
        <button id="userMenuBtn" class="user-chip">Вход</button>
        <div id="userDropdown" class="user-dropdown hidden"></div>
      </div>
    </div>
  </div>
</header>

<div class="container">

  <section id="applicationsGuestBox" class="card hidden">
    <div class="empty-state-box">
      <div class="empty-state-icon">🔐</div>
      <h3>Трябва да влезеш</h3>
      <p>За да виждаш кандидатури, трябва да имаш профил.</p>
      <a href="/account-page" class="landing-main-btn">Вход / Регистрация</a>
    </div>
  </section>

  <section id="applicationsSection" class="hidden">

    <div class="card">
      <div class="section-head">
        <h2>Моите кандидатури</h2>
        <div id="applicationsInfo" class="small-text"></div>
      </div>

      <div class="filters-grid filters-grid-3">
        <input id="searchInput" placeholder="Търси...">
        <input id="cityFilter" placeholder="Град">

        <select id="statusFilter">
          <option value="">Всички статуси</option>
          <option value="Чака одобрение">Изчакване</option>
          <option value="Одобрен">Одобрени</option>
          <option value="Отказан">Отказани</option>
        </select>
      </div>
    </div>

    <div id="applicationsList" class="job-cards-grid"></div>

  </section>

</div>

<script src="/app.js"></script>
<script>
  const guestBox = document.getElementById("applicationsGuestBox");
  const section = document.getElementById("applicationsSection");
  const list = document.getElementById("applicationsList");
  const info = document.getElementById("applicationsInfo");

  const searchInput = document.getElementById("searchInput");
  const cityFilter = document.getElementById("cityFilter");
  const statusFilter = document.getElementById("statusFilter");

  let applicationsData = [];

  function escapeHtml(text = "") {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getStatusBadge(status) {
    if (status === "Одобрен") return `<span class="status-badge success">Одобрен</span>`;
    if (status === "Отказан") return `<span class="status-badge error">Отказан</span>`;
    return `<span class="status-badge">Изчакване</span>`;
  }

  function buildCard(item) {
    return `
      <div class="job-market-card">
        <div class="job-market-top">
          <div>
            <h4 class="job-market-title">${escapeHtml(item.jobTitle || "Обява")}</h4>
            <div class="job-market-meta">
              <span>📍 ${escapeHtml(item.jobCity || "")}</span>
              <span>🏷 ${escapeHtml(item.jobCategory || "")}${item.jobSubcategory ? " / " + escapeHtml(item.jobSubcategory) : ""}</span>
              <span>${getStatusBadge(item.status)}</span>
            </div>
          </div>
        </div>

        <p class="job-market-desc">${escapeHtml(item.message || "")}</p>

        <div class="job-card-actions">
          <a href="/job/${item.jobId}" class="job-card-btn">Виж обявата</a>
          ${item.cvUrl ? `<a href="${item.cvUrl}" target="_blank" class="job-card-btn secondary">Виж CV</a>` : ""}
        </div>
      </div>
    `;
  }

  function render() {
    const search = searchInput.value.toLowerCase();
    const city = cityFilter.value.toLowerCase();
    const status = statusFilter.value;

    const filtered = applicationsData.filter(app => {
      return (
        (!search ||
          (app.jobTitle || "").toLowerCase().includes(search) ||
          (app.message || "").toLowerCase().includes(search) ||
          (app.jobCategory || "").toLowerCase().includes(search)
        ) &&
        (!city || (app.jobCity || "").toLowerCase().includes(city)) &&
        (!status || app.status === status)
      );
    });

    info.textContent = `${filtered.length} кандидатури`;

    if (!filtered.length) {
      list.innerHTML = createEmptyStateHTML({
        icon: "📭",
        title: "Няма намерени кандидатури",
        text: "Когато кандидатстваш по обява, тя ще се появи тук.",
        buttonText: "Разгледай обявите",
        buttonHref: "/jobs-page"
      });
      return;
    }

    list.innerHTML = filtered.map(buildCard).join("");
  }

  async function loadApplications() {
    const user = getCurrentUser();

    if (!user?.email) {
      guestBox.classList.remove("hidden");
      section.classList.add("hidden");
      return;
    }

    guestBox.classList.add("hidden");
    section.classList.remove("hidden");

    try {
      showSkeletons(list, 3);

      const res = await fetch(`/my-applications/${encodeURIComponent(user.email)}`);
      const data = await res.json();

      applicationsData = Array.isArray(data) ? data : [];
      render();
    } catch (e) {
      console.error("LOAD APPLICATIONS ERROR:", e);
      list.innerHTML = createEmptyStateHTML({
        icon: "⚠️",
        title: "Грешка при зареждане",
        text: "Не успяхме да заредим кандидатурите."
      });
    }
  }

  searchInput.addEventListener("input", render);
  cityFilter.addEventListener("input", render);
  statusFilter.addEventListener("change", render);

  document.addEventListener("DOMContentLoaded", () => {
    updateHeaderUser();
    updateRoleVisibility();
    loadApplications();
  });
</script>

</body>
</html>
